coder:
  env:
    - name: CODER_ACCESS_URL
      value: "http://localhost:8080"
    - name: CODER_WILDCARD_ACCESS_URL
      value: ""

    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-db-url
          key: url

    # GitHub OAuth — login de usuários
    - name: CODER_OAUTH2_GITHUB_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-id
    - name: CODER_OAUTH2_GITHUB_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-secret
    - name: CODER_OAUTH2_GITHUB_ALLOW_SIGNUPS
      value: "true"
    - name: CODER_OAUTH2_GITHUB_ALLOW_EVERYONE
      value: "true"

    # GitHub External Auth — acesso a repositórios nos workspaces
    - name: CODER_EXTERNAL_AUTH_0_ID
      value: "github"
    - name: CODER_EXTERNAL_AUTH_0_TYPE
      value: "github"
    - name: CODER_EXTERNAL_AUTH_0_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-id
    - name: CODER_EXTERNAL_AUTH_0_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: coder-github-oauth
          key: client-secret

    # Jira External Auth — leitura de tasks nos workspaces
    - name: CODER_EXTERNAL_AUTH_1_ID
      value: "jira"
    - name: CODER_EXTERNAL_AUTH_1_TYPE
      value: "jira-cloud"
    - name: CODER_EXTERNAL_AUTH_1_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: coder-jira-oauth
          key: client-id
    - name: CODER_EXTERNAL_AUTH_1_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: coder-jira-oauth
          key: client-secret

  ingress:
    enable: true
    host: "localhost"
    wildcardHost: ""
    ingressClassName: "nginx"
    tls:
      enable: false

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
