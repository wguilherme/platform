# yaml-language-server: $schema=false
---
cloudflare:
  tunnelName: "rpi"
  tunnelId: "9cbe39d5-4db7-42be-99e4-05496ae59c46"
  secretName: "tunnel-credentials"
  # Rotas configuradas no painel Cloudflare Zero Trust (Networks → Tunnels → rpi → Public Hostnames)
  # Wildcards não são suportados em ingress local pelo cloudflared ≥ 2024.x

replicaCount: 1

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
