---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: esp32-ci-template
  namespace: tekton-pipelines
spec:
  params:
    - name: gitrevision
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: TaskRun
      metadata:
        generateName: esp32-ci-
        namespace: tekton-pipelines
      spec:
        timeout: 60m
        podTemplate:
          nodeSelector:
            kubernetes.io/hostname: raspberry
        taskRef:
          name: esp32-ci
        params:
          - name: revision
            value: $(tt.params.gitrevision)
        workspaces:
          - name: source
            emptyDir: {}
          - name: pio-cache
            persistentVolumeClaim:
              claimName: pio-cache-pvc
