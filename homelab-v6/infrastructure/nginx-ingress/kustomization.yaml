---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease.yaml
namespace: ingress-nginx

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: nginx-ingress-values
    namespace: ingress-nginx
    files:
      - values.yaml=values.yaml
