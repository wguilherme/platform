---
# Seleciona a tag mais recente por ordem alfabética ascendente.
# Tags no formato YYYYMMDDHHMMSS-sha8 ordenam corretamente como timestamp.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: esp32-firmware
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: esp32-firmware
  filterTags:
    pattern: '^\d{14}-[a-f0-9]{8}$'
  policy:
    alphabetical:
      order: asc
