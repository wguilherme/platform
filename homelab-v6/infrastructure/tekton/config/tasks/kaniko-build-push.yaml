---
# Task Kaniko — build e push de imagem OCI sem necessitar Docker daemon.
# Pusha para o Zot registry (registry.phantombyte.uk).
# API: tekton.dev/v1 (atualizado do v1beta1 do homelab-v4)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build-push
  namespace: tekton-pipelines
spec:
  params:
    - name: image
      description: "Imagem de destino completa (ex: registry.phantombyte.uk/app:latest)"
      type: string
    - name: dockerfile
      description: Caminho relativo ao workspace para o Dockerfile
      type: string
      default: Dockerfile
    - name: context
      description: Caminho relativo ao workspace para o contexto de build
      type: string
      default: "."
    - name: extra-args
      description: Argumentos adicionais para o executor Kaniko
      type: array
      default: []
  workspaces:
    - name: source
      description: Workspace com o código-fonte clonado
    - name: dockerconfig
      description: "Secret com ~/.docker/config.json para autenticação no registry"
      optional: true
  results:
    - name: image-digest
      description: Digest da imagem publicada
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.23.0
      securityContext:
        runAsUser: 0
      args:
        - "--dockerfile=$(workspaces.source.path)/$(params.dockerfile)"
        - "--context=$(workspaces.source.path)/$(params.context)"
        - "--destination=$(params.image)"
        - "--digest-file=$(results.image-digest.path)"
        - "--cache=true"
        - "--cache-ttl=24h"
        - "$(params.extra-args[*])"
      env:
        - name: DOCKER_CONFIG
          value: /kaniko/.docker
      volumeMounts:
        - name: docker-config
          mountPath: /kaniko/.docker
  volumes:
    - name: docker-config
      secret:
        secretName: zot-registry-credentials
        optional: true
        items:
          - key: .dockerconfigjson
            path: config.json
