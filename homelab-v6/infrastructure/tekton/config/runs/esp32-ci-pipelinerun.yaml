---
# PipelineRun manual para testar o pipeline ESP32 CI.
# Uso: kubectl create -f esp32-ci-pipelinerun.yaml -n tekton-pipelines
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: esp32-ci-
  namespace: tekton-pipelines
spec:
  timeouts:
    pipeline: 1h0m0s
  taskRunTemplate:
    podTemplate:
      nodeSelector:
        kubernetes.io/hostname: raspberry
  pipelineRef:
    name: esp32-ci
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: local-path
          resources:
            requests:
              storage: 2Gi
    - name: pio-cache
      persistentVolumeClaim:
        claimName: pio-cache-pvc
