# yaml-language-server: $schema=false
---
replicaCount: 1

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: registry.wguilherme.com
      paths:
        - path: /
          pathType: Prefix
  tls: []    # TLS gerenciado pelo cloudflare tunnel (termina no edge)

persistence:
  enabled: true
  storageClass: local-path    # provisionador padrão do K3s
  size: 20Gi

# Autenticação htpasswd (gere com: htpasswd -nb user pass)
# Armazene em Sealed Secret e referencie aqui
authConfig: {}

configFiles:
  config.json: |-
    {
      "storage": { "rootDirectory": "/var/lib/registry" },
      "http": { "address": "0.0.0.0", "port": "5000" },
      "log": { "level": "info" },
      "extensions": {
        "search": { "enable": true },
        "ui": { "enable": true }
      }
    }

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
