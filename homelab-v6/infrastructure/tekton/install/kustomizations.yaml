---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-pipelines
  namespace: flux-system
spec:
  interval: 24h
  path: ./config
  prune: false        # evita deletar CRDs ao reconciliar
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: tekton-pipelines
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-triggers
  namespace: flux-system
spec:
  interval: 24h
  path: ./config
  prune: false
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: tekton-triggers
  dependsOn:
    - name: tekton-pipelines
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-dashboard
  namespace: flux-system
spec:
  interval: 24h
  path: ./config
  prune: false
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: tekton-dashboard
  dependsOn:
    - name: tekton-pipelines
