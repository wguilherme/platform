---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
  - sealed-secret.yaml
namespace: default

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: cloudflare-tunnel-values
    namespace: default
    files:
      - values.yaml=values.yaml
