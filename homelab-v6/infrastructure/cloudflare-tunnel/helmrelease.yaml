---
# Cloudflare Tunnel — herda o tunnelId do v5 (839f777c-...)
# O Secret "tunnel-credentials" deve conter o JSON do tunnel.
# Gere com: cloudflared tunnel token --cred-file tunnel-creds.json <TUNNEL_ID>
# Depois seele com kubeseal.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-tunnel
  namespace: default
spec:
  interval: 30m
  dependsOn:
    - name: ingress-nginx
      namespace: ingress-nginx
  chart:
    spec:
      chart: cloudflare-tunnel
      version: ">=0.3.0"
      sourceRef:
        kind: HelmRepository
        name: cloudflare
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: cloudflare-tunnel-values
