---
# Quando Flux detectar nova tag no ImageRepository, atualiza o comentário
# {"$imagepolicy": "flux-system:esp32-firmware"} em hardware-lab-v4/deploy/job.yaml
# e faz commit automaticamente no main.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: esp32-firmware
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: Flux Image Automation
        email: flux@wguilherme.com
      messageTemplate: "chore: update esp32-firmware to {{range .Updated.Images}}{{.}}{{end}}"
    push:
      branch: main
  update:
    strategy: Setters
    path: ./hardware-lab-v4/deploy
