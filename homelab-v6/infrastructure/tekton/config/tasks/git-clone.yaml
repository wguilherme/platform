---
# Task de git-clone — versão simplificada do Tekton Catalog.
# Referência: https://hub.tekton.dev/tekton/task/git-clone
# API atualizada para tekton.dev/v1 (estável desde Tekton Pipelines v0.56)
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-pipelines
spec:
  params:
    - name: url
      description: URL do repositório Git
      type: string
    - name: revision
      description: Branch, tag ou commit SHA
      type: string
      default: main
    - name: subdirectory
      description: Subdiretório dentro do workspace para o clone
      type: string
      default: ""
  workspaces:
    - name: output
      description: Workspace onde o repositório será clonado
  results:
    - name: commit
      description: SHA exato do commit clonado
  steps:
    - name: clone
      image: alpine/git:latest
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      script: |
        #!/bin/sh
        set -e
        CLONE_DIR="$(workspaces.output.path)/$(params.subdirectory)"
        rm -rf "$CLONE_DIR"
        git clone --depth=1 --branch="$(params.revision)" "$(params.url)" "$CLONE_DIR" || \
          git clone --depth=1 "$(params.url)" "$CLONE_DIR"
        cd "$CLONE_DIR"
        RESULT_SHA="$(git rev-parse HEAD)"
        printf "%s" "$RESULT_SHA" > "$(results.commit.path)"
        echo "Clonado: $(params.url)@$RESULT_SHA"
