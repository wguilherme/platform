---
# SealedSecret para credenciais do Cloudflare Tunnel.
# NÃO edite os valores encryptedData manualmente — use kubeseal para gerar.
#
# Fluxo para selar:
#   1. Crie o Secret raw (não commitar):
#      kubectl create secret generic tunnel-credentials \
#        --from-file=credentials.json=tunnel-creds.json \
#        --namespace default \
#        --dry-run=client -o yaml > /tmp/tunnel-secret.yaml
#
#   2. Sele com kubeseal:
#      kubeseal --format yaml \
#        --controller-name sealed-secrets-controller \
#        --controller-namespace kube-system \
#        < /tmp/tunnel-secret.yaml > sealed-secret.yaml
#
#   3. Commite este arquivo. O /tmp/tunnel-secret.yaml NÃO deve ser commitado.
#
# O arquivo credentials.json segue o formato:
#   { "AccountTag": "...", "TunnelID": "...", "TunnelSecret": "..." }
#
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: tunnel-credentials
  namespace: default
spec:
  encryptedData:
    credentials.json: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: tunnel-credentials
      namespace: default
