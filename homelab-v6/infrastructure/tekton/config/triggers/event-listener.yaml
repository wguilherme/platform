---
# EventListener — recebe webhooks do GitHub e dispara o pipeline.
# O Cloudflare Tunnel roteia tekton-webhook.phantombyte.uk → este Service.
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
    - name: github-push
      interceptors:
        # Valida o secret do webhook GitHub
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: eventTypes
              value: ["push"]
        # Filtra apenas pushes na branch main
        - ref:
            name: cel
          params:
            - name: filter
              value: "body.ref == 'refs/heads/main'"
      bindings:
        - ref: github-push-binding
      template:
        ref: github-build-push-template
---
# Ingress para o EventListener — usa nginx (padrão do cluster v6)
# Sem TLS gerenciado pelo cert-manager: o Cloudflare Tunnel já provê TLS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-eventlistener
  namespace: tekton-pipelines
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: tekton-webhook.phantombyte.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: el-github-listener
                port:
                  number: 8080
---
# Ingress para o Tekton Dashboard (read-only por padrão)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-dashboard
  namespace: tekton-pipelines
spec:
  ingressClassName: nginx
  rules:
    - host: tekton.phantombyte.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tekton-dashboard
                port:
                  number: 9097
