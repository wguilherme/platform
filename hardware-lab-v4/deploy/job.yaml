# Job Kubernetes que executa o container de flash do ESP32.
# A tag da imagem é atualizada automaticamente pelo Flux Image Automation.
# Flux Image Policy: flux-system:esp32-firmware
#
# Para testar manualmente:
#   kubectl delete job esp32-flash -n tekton-pipelines --ignore-not-found
#   kubectl apply -f job.yaml -n tekton-pipelines
apiVersion: batch/v1
kind: Job
metadata:
  name: esp32-flash
  namespace: tekton-pipelines
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: raspberry
      containers:
        - name: flash
          image: registry.wguilherme.com/esp32-firmware:20260328222524-d94cd97b # {"$imagepolicy": "flux-system:esp32-firmware"}
          securityContext:
            privileged: true
          env:
            - name: PORT
              value: /dev/ttyUSB0
            - name: BAUD
              value: "921600"
          volumeMounts:
            - name: usb
              mountPath: /dev/ttyUSB0
      volumes:
        - name: usb
          hostPath:
            path: /dev/ttyUSB0
            type: CharDevice
