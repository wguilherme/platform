# Job Kubernetes que executa o container de flash do ESP32.
# A tag da imagem é atualizada automaticamente pelo Flux Image Automation.
# Flux Image Policy: flux-system:esp32-firmware
#
# Para testar manualmente:
#   kubectl delete job esp32-flash -n tekton-pipelines --ignore-not-found
#   kubectl apply -f job.yaml -n tekton-pipelines
apiVersion: batch/v1
kind: Job
metadata:
  name: esp32-flash
  namespace: tekton-pipelines
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: raspberry
      containers:
        - name: flash
          image: registry.wguilherme.com/esp32-firmware:20260329184135-5c45de57 # {"$imagepolicy": "flux-system:esp32-firmware"}
          securityContext:
            privileged: true
          resources:
            limits:
              smarter-devices/ttyUSB0: 1
          env:
            - name: PORT
              value: /dev/ttyUSB0
            - name: BAUD
              value: "921600"
