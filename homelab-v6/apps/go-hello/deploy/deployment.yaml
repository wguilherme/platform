apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-hello
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-hello
  template:
    metadata:
      labels:
        app: go-hello
    spec:
      nodeSelector:
        kubernetes.io/hostname: raspberry
      containers:
        - name: go-hello
          image: registry.wguilherme.com/go-hello:20260328223830-86b22a16 # {"$imagepolicy": "flux-system:go-hello"}
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "latest"
