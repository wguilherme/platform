apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - sealed-secret.yaml
  - helmrelease.yaml

namespace: coder

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: coder-values
    namespace: coder
    files:
      - values.yaml=values.yaml
