---
# Sealed Secrets — deve ser instalado antes dos outros componentes
# para que secrets possam ser decriptados pelo controller.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: sealed-secrets
      version: "2.17.7"
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
      interval: 12h
  values:
    fullnameOverride: sealed-secrets-controller
