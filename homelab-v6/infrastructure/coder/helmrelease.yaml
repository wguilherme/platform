---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coder
  namespace: coder
spec:
  interval: 30m
  dependsOn:
    - name: postgresql-coder
      namespace: postgresql-coder
  chart:
    spec:
      chart: coder
      version: "2.x"
      sourceRef:
        kind: HelmRepository
        name: coder-v2
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: coder-values
