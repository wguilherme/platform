---
all:
  hosts:
    rpi:
      ansible_host: raspberry.local
      ansible_user: wguilherme
      ansible_ssh_private_key_file: ~/.ssh/personal/wguilherme.dev.github
      ansible_python_interpreter: /usr/bin/python3

  vars:
    k3s_version: "v1.35.1+k3s1"
    k3s_disable_swap: true
    k3s_enable_cgroups: true
    k3s_fetch_kubeconfig: true
    k3s_local_kubeconfig_path: "~/.kube/local/platform/config.rpi"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_become: true
    ansible_become_method: sudo
