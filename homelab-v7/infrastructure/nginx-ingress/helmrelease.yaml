---
# Nginx Ingress Controller — padrão K8s, mesmo usado no homelab-v5.
# K3s foi instalado com --disable=traefik para ceder espaço a este.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.1"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: nginx-ingress-values
