# yaml-language-server: $schema=false
---
replicaCount: 1

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: registry.wguilherme.com
      paths:
        - path: /
          pathType: Prefix
  tls: []    # TLS gerenciado pelo cloudflare tunnel (termina no edge)

persistence:
  enabled: true
  storageClass: local-path    # provisionador padrão do K3s
  size: 20Gi

# Autenticação htpasswd (gere com: htpasswd -nb user pass)
# Armazene em Sealed Secret e referencie aqui
authConfig: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
