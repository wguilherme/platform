---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.0"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 12h
  values:
    crds:
      enabled: true   # instala CRDs via Helm (recomendado a partir da v1.15)
    global:
      leaderElection:
        namespace: cert-manager
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
