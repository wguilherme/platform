---
# Pipeline genérico: git-clone → kaniko build & push → resultado
# Pode ser referenciado por qualquer TriggerTemplate passando os params.
# API: tekton.dev/v1
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-push
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      description: URL do repositório Git
      type: string
    - name: revision
      description: Branch, tag ou SHA do commit
      type: string
      default: main
    - name: image
      description: "Imagem de destino (ex: registry.phantombyte.uk/meu-app:latest)"
      type: string
    - name: dockerfile
      description: Caminho relativo ao workspace para o Dockerfile
      type: string
      default: Dockerfile
    - name: context
      description: Contexto de build relativo ao workspace
      type: string
      default: "."

  workspaces:
    - name: shared-workspace
      description: Workspace compartilhado entre git-clone e kaniko

  results:
    - name: image-digest
      description: Digest da imagem publicada
      value: $(tasks.build-push.results.image-digest)
    - name: commit
      description: SHA do commit buildado
      value: $(tasks.git-clone.results.commit)

  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: shared-workspace

    - name: build-push
      taskRef:
        name: kaniko-build-push
      runAfter:
        - git-clone
      params:
        - name: image
          value: $(params.image)
        - name: dockerfile
          value: $(params.dockerfile)
        - name: context
          value: $(params.context)
      workspaces:
        - name: source
          workspace: shared-workspace
