---
# TaskRun manual para testar o pipeline ESP32.
# Uso: kubectl create -f esp32-taskrun.yaml -n tekton-pipelines
apiVersion: tekton.dev/v1
kind: TaskRun
metadata:
  generateName: esp32-deploy-
  namespace: tekton-pipelines
spec:
  timeout: 45m
  podTemplate:
    nodeSelector:
      kubernetes.io/hostname: raspberry
  taskRef:
    name: esp32-build-flash
  params:
    - name: repo-url
      value: https://github.com/wguilherme/platform.git
    - name: revision
      value: main
    - name: firmware-dir
      value: hardware-lab-v4/firmware
    - name: pio-env
      value: esp32-usb
  workspaces:
    - name: source
      emptyDir: {}
    - name: pio-cache
      persistentVolumeClaim:
        claimName: pio-cache-pvc
