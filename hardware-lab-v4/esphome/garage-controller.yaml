esphome:
  name: garagem-esp32
  friendly_name: "ESP32 Controle Garagem"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Garagem-ESP32-Fallback"
    password: !secret ap_password

captive_portal:

logger:
  level: INFO
  baud_rate: 115200

api:
  password: !secret api_password
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80
  version: 2

switch:
  - platform: gpio
    id: relay_garagem
    name: "Rele Garagem"
    pin:
      number: GPIO2
      inverted: true
    restore_mode: ALWAYS_OFF
    internal: true

binary_sensor:
  - platform: status
    name: "Status WiFi"

cover:
  - platform: template
    device_class: garage
    name: "Portao Garagem"
    id: garage_door
    icon: "mdi:garage"
    open_action:
      - switch.turn_on: relay_garagem
      - delay: 500ms
      - switch.turn_off: relay_garagem
    close_action:
      - switch.turn_on: relay_garagem
      - delay: 500ms
      - switch.turn_off: relay_garagem
    stop_action:
      - switch.turn_on: relay_garagem
      - delay: 500ms
      - switch.turn_off: relay_garagem

sensor:
  - platform: wifi_signal
    name: "Sinal WiFi"
    update_interval: 60s
  - platform: uptime
    name: "Tempo Ligado"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

button:
  - platform: restart
    name: "Reiniciar ESP32"
  - platform: template
    name: "Pulso Garagem"
    icon: "mdi:garage-open"
    on_press:
      - switch.turn_on: relay_garagem
      - delay: 500ms
      - switch.turn_off: relay_garagem

time:
  - platform: homeassistant
    id: homeassistant_time
