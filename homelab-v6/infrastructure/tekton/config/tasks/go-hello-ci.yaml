---
# Task Go Hello CI: clone → kaniko build+push para zot registry.
# Todos os steps rodam no mesmo Pod — source é emptyDir, sem PVC necessário.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: go-hello-ci
  namespace: tekton-pipelines
spec:
  params:
    - name: repo-url
      type: string
      default: https://github.com/wguilherme/platform.git
    - name: revision
      type: string
      default: main
    - name: app-dir
      type: string
      default: apps/go-hello
    - name: image-repo
      type: string
      default: registry.wguilherme.com/go-hello

  workspaces:
    - name: source

  results:
    - name: image-tag
      description: "Tag publicada: YYYYMMDDHHMMSS-sha8"

  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        rm -rf repo
        git clone --depth=1 "$(params.repo-url)" repo
        cd repo && git checkout "$(params.revision)"
        SHA=$(git rev-parse --short=8 HEAD)
        TAG=$(date +%Y%m%d%H%M%S)-$SHA
        echo "$TAG" > $(workspaces.source.path)/.image-tag
        printf "%s" "$TAG" > $(results.image-tag.path)
        echo "Clonado @ $SHA — tag: $TAG"

    - name: push
      image: gcr.io/kaniko-project/executor:v1.23.0-debug
      script: |
        #!/busybox/sh
        set -e
        TAG=$(cat $(workspaces.source.path)/.image-tag)
        DEST="$(params.image-repo):$TAG"
        echo "=== Push: $DEST ==="
        /kaniko/executor \
          --dockerfile=$(workspaces.source.path)/repo/$(params.app-dir)/Dockerfile \
          --context=$(workspaces.source.path)/repo/$(params.app-dir) \
          --destination=$DEST \
          --skip-tls-verify-registry=registry.wguilherme.com
        echo "=== Push OK ==="
