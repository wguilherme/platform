---
# Zot — OCI registry leve, substitui Harbor do v5.
# ARM64 nativo, sem dependências externas.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: zot
spec:
  interval: 30m
  chart:
    spec:
      chart: zot
      version: "0.1.102"
      sourceRef:
        kind: HelmRepository
        name: project-zot
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: zot-values
