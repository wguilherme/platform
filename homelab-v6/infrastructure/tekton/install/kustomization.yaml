---
# Instala Tekton a partir dos release YAMLs oficiais (imagens Docker reais, não ko://).
# Os GitRepositories apontando para ./config/ usam ko:// e não funcionam diretamente.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/tektoncd/pipeline/releases/download/v0.65.0/release.yaml
  - https://github.com/tektoncd/triggers/releases/download/v0.30.0/release.yaml
  - https://github.com/tektoncd/triggers/releases/download/v0.30.0/interceptors.yaml
  - https://github.com/tektoncd/dashboard/releases/download/v0.49.0/release.yaml
