---
# Ajuste o range de IPs conforme a sua rede local.
# Estes IPs precisam estar fora do pool DHCP do roteador.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: homelab-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.10/32   # IP do RPi — single-node: o ingress recebe o próprio IP do nó
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - homelab-pool
