---
# ClusterIssuer usando DNS-01 via Cloudflare.
# Requer um Secret "cloudflare-api-token" com a chave "api-token".
# Crie com: kubectl create secret generic cloudflare-api-token \
#             -n cert-manager \
#             --from-literal=api-token=<SEU_TOKEN>
# Ou use Sealed Secrets para commitar de forma segura.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: guilherme@phantombyte.uk    # ajuste seu e-mail
    privateKeySecretRef:
      name: letsencrypt-cloudflare-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
# Issuer de staging para testes (sem rate limit)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: guilherme@phantombyte.uk
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
