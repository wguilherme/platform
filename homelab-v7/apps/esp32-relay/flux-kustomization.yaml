---
# Flux Kustomization que aplica o Job de flash do ESP32.
# force: true permite recriar o Job (imutável) quando a imagem muda.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: esp32-flash-job
  namespace: flux-system
spec:
  interval: 5m
  path: ./homelab-v6/apps/esp32-relay/deploy
  prune: true
  force: true
  sourceRef:
    kind: GitRepository
    name: flux-system
