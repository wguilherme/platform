---
- name: Preparar o nó
  hosts: all
  gather_facts: true
  any_errors_fatal: true
  roles:
    - role: prepare
      tags: prepare

- name: Instalar K3s
  hosts: all
  gather_facts: true
  any_errors_fatal: true
  roles:
    - role: k3s-server
      tags: k3s

  post_tasks:
    - name: Aguardar node Ready
      shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get nodes {{ ansible_hostname }} --no-headers | awk '{print $2}'
      register: node_status
      until: node_status.stdout == "Ready"
      retries: 30
      delay: 10
      changed_when: false

    - name: Status do cluster
      shell: KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get nodes -o wide
      register: nodes
      changed_when: false
    - name: Exibir nodes
      debug:
        msg: "{{ nodes.stdout_lines }}"
