# ATENÇÃO: Este arquivo precisa ser gerado com kubeseal para cada secret.
#
# ── 1. CODER_PG_CONNECTION_URL ──────────────────────────────────────────────
# Substitua <DB_PASSWORD> pela senha gerada no postgresql-coder/sealed-secret.yaml
#
#   kubectl create secret generic coder-db-url \
#     --namespace coder \
#     --from-literal=url="postgres://coder:<DB_PASSWORD>@postgresql-coder-postgresql.postgresql-coder.svc.cluster.local:5432/coder?sslmode=disable" \
#     --dry-run=client -o yaml | kubeseal --format yaml \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace kube-system \
#     >> homelab-v6/infrastructure/coder/sealed-secret.yaml
#
# ── 2. Claude OAuth Token ────────────────────────────────────────────────────
# Rodar localmente: claude setup-token
# Copiar o token gerado (sk-ant-oat01-...)
#
#   kubectl create secret generic claude-oauth \
#     --namespace coder \
#     --from-literal=token="sk-ant-oat01-XXXXXXXXXX" \
#     --dry-run=client -o yaml | kubeseal --format yaml \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace kube-system \
#     >> homelab-v6/infrastructure/coder/sealed-secret.yaml
#
# ── 3. GitHub OAuth App ──────────────────────────────────────────────────────
# Criar em: github.com/settings/developers → OAuth Apps → New OAuth App
#   Homepage URL: https://coder.wguilherme.com
#   Callback URL: https://coder.wguilherme.com/api/v2/users/oauth2/github/callback
#
#   kubectl create secret generic coder-github-oauth \
#     --namespace coder \
#     --from-literal=client-id="<GITHUB_CLIENT_ID>" \
#     --from-literal=client-secret="<GITHUB_CLIENT_SECRET>" \
#     --dry-run=client -o yaml | kubeseal --format yaml \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace kube-system \
#     >> homelab-v6/infrastructure/coder/sealed-secret.yaml
#
# ── 4. Jira OAuth App ────────────────────────────────────────────────────────
# Criar em: developer.atlassian.com → Create app → OAuth 2.0 (3LO)
#   Callback URL: https://coder.wguilherme.com/api/v2/external-auth/jira/callback
#   Scopes: read:jira-work, read:jira-user
#
#   kubectl create secret generic coder-jira-oauth \
#     --namespace coder \
#     --from-literal=client-id="<JIRA_CLIENT_ID>" \
#     --from-literal=client-secret="<JIRA_CLIENT_SECRET>" \
#     --dry-run=client -o yaml | kubeseal --format yaml \
#     --controller-name sealed-secrets-controller \
#     --controller-namespace kube-system \
#     >> homelab-v6/infrastructure/coder/sealed-secret.yaml
#
# Substitua este arquivo pelo output do kubeseal antes de fazer commit.
